<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prontuário Eletrônico</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.hero {
  background-image: url('img/Veronica.jpeg');
  background-size: cover;
  background-position: center 30%;
  width: 100%;
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(135, 206, 250, 0.2);
  z-index: 1;
}

.cloud {
  position: absolute;
  background: rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  width: 200px;
  height: 100px;
  top: 10%;
  animation: floatCloud 60s linear infinite;
  z-index: 2;
}

.cloud:nth-child(2) { top: 30%; width: 250px; height: 120px; animation-duration: 80s; }
.cloud:nth-child(3) { top: 60%; width: 180px; height: 90px; animation-duration: 100s; }

@keyframes floatCloud {
  0% { left: -250px; }
  100% { left: 100%; }
}

.hero-content {
  position: relative;
  z-index: 3;
  text-align: center;
  max-width: 600px;
  color: #ffffff;
}

.hero-content h1 {
  font-size: 2.8rem;
  margin-bottom: 20px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.hero-content .welcome {
  font-size: 1.5rem;
  padding: 15px 25px;
  background: rgba(173, 216, 230, 0.6);
  border-radius: 15px;
  display: inline-block;
  text-shadow: none;
  margin-bottom: 20px;
}

.hero-content .btn {
  padding: 15px 30px;
  font-size: 1.1rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #0066cc;
  color: white;
  transition: .3s ease;
}

.hero-content .btn:hover {
  background: #004a99;
}

@media (max-width: 768px) {
  .hero-content h1 { font-size: 2rem; }
  .hero-content .welcome { font-size: 1.2rem; padding: 10px 15px; }
  .hero-content .btn { width: 100%; }
}
</style>
</head>

<body>
<div class="hero">
  <div class="overlay"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <div class="hero-content">
    <h1>Prontuário Eletrônico para Atendimento Profissional</h1>
    <div class="welcome">Seja bem-vinda, Dra. Veronica!</div>
    <button class="btn" onclick="window.location.href='login.html'">Começar Agora</button>
  </div>
</div>
</body>
</html>
