<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Prontuário Eletrônico</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>Dashboard - Pacientes</h1>
    <form id="add-paciente-form">
      <input type="text" id="paciente-nome" placeholder="Nome do paciente" required>
      <input type="number" id="paciente-idade" placeholder="Idade" required>
      <button type="submit">Adicionar Paciente</button>
    </form>
    <h2>Lista de Pacientes</h2>
    <div id="pacientes-list"></div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
